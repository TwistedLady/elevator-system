# Log4j2 baked into /opt/spark/conf for the driver and every executor pod.
# console: captured by kubectl logs. file: durable, size-rolled, one per pod
# (${env:HOSTNAME}) on the persistent hostPath volume. Our job logs INFO, libs WARN.
rootLogger.level = warn
rootLogger.appenderRef.stdout.ref = console
rootLogger.appenderRef.file.ref = file

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n

appender.file.type = RollingFile
appender.file.name = file
appender.file.fileName = /opt/elevator-bi/logs/${env:HOSTNAME}.log
appender.file.filePattern = /opt/elevator-bi/logs/${env:HOSTNAME}.%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} [%t] - %m%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 20MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 5

logger.bi.name = pl.feelcodes.elevator.bi
logger.bi.level = info
logger.kafka.name = org.apache.kafka
logger.kafka.level = warn
logger.sparkkafka.name = org.apache.spark.sql.kafka010
logger.sparkkafka.level = warn
