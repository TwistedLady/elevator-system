# Postgres for the Pekko event journal + projections (next step).
# A StatefulSet (not a Deployment) so the pod keeps a stable identity and its own
# PersistentVolumeClaim — the data survives pod restarts/reschedules.
# Other pods reach it at "postgres:5432" via the headless Service below.
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None          # headless: stable DNS for the StatefulSet pod
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB, value: "elevator" }
            - { name: POSTGRES_USER, value: "elevator" }
            # demo only — replace with a valueFrom: secretKeyRef in a real cluster
            - { name: POSTGRES_PASSWORD, value: "elevator" }
            # keep PGDATA in a subdir so the mounted volume's lost+found doesn't clash
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            # Schema init: postgres:17 runs every *.sql here on first init (empty data dir).
            # Backed by the postgres-init ConfigMap (generated from db/init/*.sql).
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "elevator", "-d", "elevator"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "elevator", "-d", "elevator"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
