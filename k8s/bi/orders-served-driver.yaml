# The Spark "orders served" job, deployed as full Spark-on-Kubernetes.
#
# Counts how many times each elevator reached an ordered floor (= completed orders) by reading the
# order_status read-model over JDBC every ELEVATOR_BI_SERVED_INTERVAL seconds, and upserting the
# counts into elevator_orders_served. This Deployment pod is the Spark DRIVER (client mode); it
# spawns 2 EXECUTOR pods via the k8s resource manager.
#
# BATCH job → no streaming checkpoint (unlike mileage). It only needs the durable log volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-orders-served
  labels: { app: elevator-bi, part-of: elevator }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: elevator-bi, role: orders-served-driver }
  template:
    metadata:
      labels: { app: elevator-bi, role: orders-served-driver, part-of: elevator }
    spec:
      serviceAccountName: elevator-bi-spark
      terminationGracePeriodSeconds: 30
      initContainers:
        # Make the durable log + event-log dir writable by the non-root spark user (uid 185).
        - name: init-dirs
          image: elevator-bi:local
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - "mkdir -p /opt/elevator-bi/logs/spark-events && chmod -R 0777 /opt/elevator-bi/logs"
          securityContext:
            runAsUser: 0
          volumeMounts:
            - { name: logs, mountPath: /opt/elevator-bi/logs }
      containers:
        - name: driver
          image: elevator-bi:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: elevator-bi-config }
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: HOME, value: "/tmp" }
            - { name: SPARK_LOCAL_DIRS, value: "/tmp" }
          command: ["/opt/spark/bin/spark-submit"]
          args:
            - "--master"
            - "k8s://https://kubernetes.default.svc:443"
            - "--deploy-mode"
            - "client"
            - "--name"
            - "elevator-orders-served"
            - "--class"
            - "pl.feelcodes.elevator.bi.OrdersServedJob"
            - "--conf"
            - "spark.kubernetes.namespace=default"
            - "--conf"
            - "spark.kubernetes.container.image=elevator-bi:local"
            - "--conf"
            - "spark.kubernetes.container.image.pullPolicy=IfNotPresent"
            - "--conf"
            - "spark.kubernetes.authenticate.driver.serviceAccountName=elevator-bi-spark"
            - "--conf"
            - "spark.kubernetes.driver.pod.name=$(POD_NAME)"
            - "--conf"
            - "spark.executor.instances=2"
            - "--conf"
            - "spark.executor.cores=1"
            - "--conf"
            - "spark.executor.memory=512m"
            - "--conf"
            - "spark.driver.memory=512m"
            - "--conf"
            - "spark.sql.shuffle.partitions=4"
            # Durable Spark event logs (driver-written) on the persistent log volume.
            - "--conf"
            - "spark.eventLog.enabled=true"
            - "--conf"
            - "spark.eventLog.dir=file:///opt/elevator-bi/logs/spark-events"
            # Client-mode driver networking (distinct ports from the mileage driver, for clarity).
            - "--conf"
            - "spark.driver.host=$(POD_IP)"
            - "--conf"
            - "spark.driver.bindAddress=0.0.0.0"
            - "--conf"
            - "spark.driver.port=7080"
            - "--conf"
            - "spark.blockManager.port=7081"
            - "--conf"
            - "spark.kubernetes.executor.label.app=elevator-bi"
            - "--conf"
            - "spark.kubernetes.executor.label.part-of=elevator"
            - "--conf"
            - "spark.kubernetes.executor.label.role=executor"
            # Executors write their durable rolling logs to the same persistent hostPath.
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.mount.path=/opt/elevator-bi/logs"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.options.path=/mnt/elevator-bi-logs"
            - "local:///opt/spark/jobs/elevator-bi.jar"
          ports:
            - { name: driver-rpc, containerPort: 7080 }
            - { name: blockmanager, containerPort: 7081 }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: logs, mountPath: /opt/elevator-bi/logs }
      volumes:
        - name: logs
          hostPath:
            path: /mnt/elevator-bi-logs
            type: DirectoryOrCreate
