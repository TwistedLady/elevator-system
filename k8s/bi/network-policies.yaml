# Additive NetworkPolicies for the BI job. The base cluster has a default-deny-ingress, and the
# existing kafka/postgres policies only admit elevator-api + elevator-app. NetworkPolicies are a
# UNION, so these supplementary policies grant exactly what the Spark driver + executors need,
# without editing the core k8s/network-policies.yaml.
#
#   - bi <-> bi   : driver <-> executor RPC (Spark uses fixed 7078/7079 here, plus dynamic ports).
#   - bi -> kafka : executors read the elevator-state topic.
#   - bi -> pg    : the driver upserts mileage (foreachBatch runs on the driver).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bi-internal
  labels: { app: elevator-bi, part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: elevator-bi }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-from-bi
  labels: { app: elevator-bi, part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-bi
  labels: { app: elevator-bi, part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 5432 }
