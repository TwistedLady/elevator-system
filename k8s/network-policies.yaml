# NetworkPolicies — expose ONLY the api to the outside; keep kafka/postgres/app internal.
#
# Model (ingress, default namespace):
#   - default-deny-ingress : every pod denies all ingress unless another policy allows it.
#   - elevator-api  : 8080 open to everyone  -> the single externally-visible surface.
#   - kafka         : 9092 only from api + app.
#   - postgres      : 5432 only from api + app.
#   - elevator-app  : 2551 (remoting) + 8558 (management) only from other app pods (Pekko cluster).
#
# NOTE (kind): the default CNI (kindnet) does NOT enforce NetworkPolicy — these are declarative and
# become active only under a policy-capable CNI (e.g. Calico). Also `kubectl port-forward` reaches a
# pod via the kubelet and bypasses NetworkPolicy regardless, so it is not a substitute for not
# exposing a Service. See k8s/README or the branch notes.
#
# NOTE (probes): under an enforcing CNI, kubelet liveness/readiness probes to app:8558 (/alive,/ready)
# originate from the node — add an ipBlock allow for the node/pod CIDR to app:8558 if the CNI applies
# policy to kubelet traffic (Calico does), or probes will fail. Not needed on kindnet.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels: { part-of: elevator }
spec:
  podSelector: {}            # all pods in the namespace
  policyTypes: [Ingress]
  # no ingress rules => deny all ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-external
  labels: { part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: elevator-api }
  policyTypes: [Ingress]
  ingress:
    - from: []               # from anywhere (incl. outside the cluster) — the visible edge
      ports:
        - { protocol: TCP, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-internal
  labels: { part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-internal
  labels: { part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-cluster-internal
  labels: { part-of: elevator }
spec:
  podSelector:
    matchLabels: { app: elevator-app }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 2551 }   # Pekko remoting
        - { protocol: TCP, port: 8558 }   # Pekko management / cluster bootstrap
