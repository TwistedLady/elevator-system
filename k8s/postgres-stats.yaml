# SEPARATE Postgres instance for the analytics (BI) store — isolated from the operational `postgres`
# (Pekko journal + order read-models). The Spark jobs WRITE the stats here; the api READS them here
# via a dedicated datasource. Own StatefulSet + PVC = own storage, lifecycle, and failure domain.
# Reachable in-cluster at "postgres-stats:5432", database "elevator_stats".
apiVersion: v1
kind: Service
metadata:
  name: postgres-stats
spec:
  clusterIP: None          # headless: stable DNS for the StatefulSet pod
  selector:
    app: postgres-stats
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stats
spec:
  serviceName: postgres-stats
  replicas: 1
  selector:
    matchLabels:
      app: postgres-stats
  template:
    metadata:
      labels:
        app: postgres-stats
        part-of: elevator
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB, value: "elevator_stats" }
            - { name: POSTGRES_USER, value: "elevator" }
            # demo only — replace with a valueFrom: secretKeyRef in a real cluster
            - { name: POSTGRES_PASSWORD, value: "elevator" }
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            # Stats schema init on first init (empty data dir), from the postgres-stats-init ConfigMap.
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "elevator", "-d", "elevator_stats"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "elevator", "-d", "elevator_stats"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: init
          configMap:
            name: postgres-stats-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
