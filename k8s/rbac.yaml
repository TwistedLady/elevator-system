# RBAC for Pekko Cluster Bootstrap's kubernetes-api discovery: the app pods need to LIST pods
# (filtered by label app=elevator-app) to find each other and form one cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elevator-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: elevator-app-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elevator-app-pod-reader
subjects:
  - kind: ServiceAccount
    name: elevator-app
roleRef:
  kind: Role
  name: elevator-app-pod-reader
  apiGroup: rbac.authorization.k8s.io
