# The Spring edge. Has a Service so you can reach POST /api/order and the monitor.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-api
spec:
  replicas: 2
  # Roll in place (no surge pod) so it schedules on a CPU-constrained single node — see app.yaml.
  # With 2 replicas + maxUnavailable 1, one stays serving throughout a roll = zero-downtime deploys.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: elevator-api
  template:
    metadata:
      labels:
        app: elevator-api
    spec:
      # Only used when pulling from a *private* GHCR; harmless while the packages are
      # public or on the kind demo (:local images). CD creates this secret when
      # GHCR_PULL_TOKEN is set (see docs/CICD.md); a missing secret is tolerated.
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: elevator-api
          image: elevator-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: elevator-config
          env:                                 # TLS: serve HTTPS from the mounted keystore
            - { name: ELEVATOR_TLS_ENABLED, value: "true" }
            - { name: ELEVATOR_TLS_KEYSTORE, value: "/etc/tls/keystore.p12" }
            - name: ELEVATOR_TLS_PASSWORD
              valueFrom:
                secretKeyRef: { name: elevator-api-tls, key: password }
            # Per-replica id -> unique-but-stable state-consumer group (fanout: each replica reads all).
            - name: ELEVATOR_POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
          volumeMounts:
            - { name: tls, mountPath: /etc/tls, readOnly: true }
            # Same ConfigMap as files, for live limit reload (no subPath — keeps updates flowing).
            - { name: elevator-config, mountPath: /etc/elevator-config, readOnly: true }
          readinessProbe:                      # "is it ready for traffic?" (HTTPS now)
            httpGet: { path: /api/elevator, port: 8080, scheme: HTTPS }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
      volumes:
        - name: tls
          secret:
            secretName: elevator-api-tls
            items:
              - { key: keystore.p12, path: keystore.p12 }
        - name: elevator-config
          configMap:
            name: elevator-config
---
apiVersion: v1
kind: Service
metadata:
  name: elevator-api
spec:
  selector:
    app: elevator-api
  ports:
    - port: 8080
      targetPort: 8080
