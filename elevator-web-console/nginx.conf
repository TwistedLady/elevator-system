server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the api edge so the app's relative URLs stay same-origin.
    # The in-cluster api serves HTTPS (self-signed); verification off for internal traffic.
    location /api/ {
        proxy_pass https://elevator-api:8080;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";   # keep-alive
        proxy_buffering off;              # stream SSE (/api/elevator/stream) immediately
        proxy_read_timeout 1h;
    }

    location /actuator/ {
        proxy_pass https://elevator-api:8080;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
