<div class="trend">
  <svg [attr.width]="w" [attr.height]="plotH" class="plot" role="img"
       [attr.aria-label]="state().elevatorName + ' floor over time'">
    @for (g of gridlines(); track g.floor) {
      <line class="grid" x1="0" [attr.x2]="w" [attr.y1]="g.y" [attr.y2]="g.y" />
    }
    @if (linePath()) {
      <path class="line" [attr.d]="linePath()" />
    }
    @if (dot(); as d) {
      <circle class="now" [attr.cx]="d.x" [attr.cy]="d.y" r="4" />
    } @else {
      <text class="empty" [attr.x]="w / 2" [attr.y]="plotH / 2">collecting…</text>
    }
  </svg>

  <div class="caption">
    <span class="name">{{ state().elevatorName }}</span>
    <span class="floor">floor {{ state().floor }}</span>
  </div>
</div>
