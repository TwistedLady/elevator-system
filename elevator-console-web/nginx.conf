# Serves the SPA (unknown paths -> index.html) and reverse-proxies /api + /actuator to the
# in-cluster elevator-api over HTTPS (self-signed, verify off); /api/ streams SSE unbuffered.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://elevator-api:8080;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location /actuator/ {
        proxy_pass https://elevator-api:8080;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
