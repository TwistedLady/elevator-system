# TEST profile: human-readable console, INFO level. Order-validation limits for local/test runs
# (prod gets these from the mounted ConfigMap).
elevator:
  max-floor: 15
  elevators: e1,e2,e3,e4,e5,e6,e7,e8,e9,e10
logging:
  level:
    pl.feelcodes.elevator: INFO
    org.springframework: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{20} : %msg%n"
