spring:
  mvc:
    log-request-details: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: elevator-api
elevator:
  command-topic: elevator-commands
  state-topic: elevator-state
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics   # keep it tight; not "*"
  endpoint:
    health:
      probes:
        enabled: true                  # adds /health/liveness and /health/readiness
      show-details: always             # switch to when_authorized once security is added
      group:
        readiness:
          include: readinessState,kafka  # broker must be reachable to be "ready"
logging:
  level:
    org.springframework: INFO
