# elevator-api config. Default profile is `test` (SPRING_PROFILES_ACTIVE=prod overrides). HTTPS on
# 8080 only when a keystore is mounted (k8s), off for local. r2dbc = operational `elevator` DB;
# order-validation limits come from a mounted ConfigMap (prod) or application-test.yml, never here.
# `elevator.stats.fact-path` is the single Spark BI Parquet fact table (DuckDB views compute
# every stat over it); auth is passenger JWT on POST /api/call.
server:
  ssl:
    enabled: ${ELEVATOR_TLS_ENABLED:false}
    key-store: ${ELEVATOR_TLS_KEYSTORE:/etc/tls/keystore.p12}
    key-store-password: ${ELEVATOR_TLS_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: elevator-api
spring:
  profiles:
    active: test
  r2dbc:
    url: r2dbc:postgresql://${ELEVATOR_PG_HOST:localhost}:${ELEVATOR_PG_PORT:5432}/${ELEVATOR_PG_DATABASE:elevator}
    username: ${ELEVATOR_PG_USER:elevator}
    password: ${ELEVATOR_PG_PASSWORD:elevator}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: elevator-api
elevator:
  stats:
    fact-path: ${ELEVATOR_STATS_FACT_PATH:/data/elevator-facts.parquet}
  call-topic: elevator-calls
  state-topic: elevator-state
  door-state-topic: elevator-door-state
  auth:
    issuer: elevator-api
    audience: elevator
    token-ttl-seconds: 300
    client-secret: ${ELEVATOR_CLIENT_SECRET:dev-secret}
  pod-name: ${ELEVATOR_POD_NAME:}
management:
  health:
    r2dbc:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,kafka
logging:
  level:
    org.apache.kafka: WARN
