# Slim demo infra: a single-node KRaft Kafka + Postgres (no ZooKeeper, no Oracle, no web).
# Run under an isolated project name so it never collides with the full docker-compose.yml:
#   docker compose -p elevator-demo -f docker-compose.demo.yml up -d
# The two JVM apps (elevator-app, elevator-api) run on the host via scripts/demo-up.sh.
# Postgres backs the Pekko event journal + the read-side projection (elevator_state_view).
# Schema is created from ./db/init on first start; the named volume `pgdata` survives restarts.
services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: elevator-demo-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Persist broker + KRaft metadata so a restart no longer wipes topics (and the live chart).
      # Default log.dirs is under /tmp, which is lost on recreate; point it at the mounted volume.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Pin the cluster id so the existing volume's meta.properties always matches on remount.
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafkadata:/var/lib/kafka/data  # survives container restarts/recreates
      - ./logs/kafka:/opt/kafka/logs   # server.log, controller.log, … on the host

  postgres:
    image: postgres:17
    container_name: elevator-demo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: elevator
      POSTGRES_USER: elevator
      POSTGRES_PASSWORD: elevator        # demo only — use a secret in real deployments
    # Write the server log to a file (default is stderr only) so it lands in the host ./logs.
    command:
      - "postgres"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/var/log/postgresql"
      - "-c"
      - "log_filename=postgresql.log"
      - "-c"
      - "log_rotation_age=0"             # one growing file for the demo (no daily rotation)
      - "-c"
      - "log_rotation_size=0"
    volumes:
      - pgdata:/var/lib/postgresql/data  # persists across container restarts/recreates
      - ./db/init:/docker-entrypoint-initdb.d:ro  # schema; runs once on a fresh pgdata volume
      - ./logs/postgres:/var/log/postgresql  # postgresql.log on the host (dir must be writable: chmod 777)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elevator -d elevator"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  kafkadata:
