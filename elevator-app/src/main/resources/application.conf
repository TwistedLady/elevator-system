# Pekko cluster. Reactive (R2DBC) Postgres journal + read-side projection.
# Kafka and Postgres on localhost (see docker-compose.demo.yml).
#
# Two membership modes:
#   - LOCAL (default): static single-node seed on 127.0.0.1 (docker compose demo, tests).
#   - KUBERNETES: set ELEVATOR_CLUSTER_BOOTSTRAP=on. ElevatorApp starts Pekko Management +
#     Cluster Bootstrap (k8s-api pod discovery) and clears seed-nodes (in code) so the pods
#     discover each other and form ONE multi-node cluster instead of each self-seeding.

pekko.actor.provider = cluster

# Operator entities run the engine's blocking travel-time cost (Thread.sleep). Isolate them on a
# dedicated pool so a moving elevator never starves the default dispatcher / other entities.
elevator-blocking-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor.fixed-pool-size = 16
  throughput = 1
}

pekko.remote.artery {
  transport = tcp
  # 127.0.0.1 locally; in k8s each pod binds its own IP (downward API) so peers can reach it.
  canonical.hostname = "127.0.0.1"
  canonical.hostname = ${?ELEVATOR_POD_IP}
  canonical.port = 2551
}

# Local single-node seed. Cleared in code when ELEVATOR_CLUSTER_BOOTSTRAP=on (bootstrap forms
# the cluster instead — static seed-nodes must be empty for bootstrap to run).
pekko.cluster.seed-nodes = ["pekko://elevator-cluster@127.0.0.1:2551"]
pekko.cluster.downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

# How many members before the cluster is considered "ready". 1 locally; k8s sets 2 so a node
# only reports ready (k8s readiness probe) once it has actually joined a real cluster.
pekko.cluster.min-nr-of-members = 1
pekko.cluster.min-nr-of-members = ${?ELEVATOR_CLUSTER_MIN_MEMBERS}

# Pekko Management endpoint (k8s readiness/liveness hit /ready and /alive here) + Cluster
# Bootstrap via the Kubernetes API. Inert until ElevatorApp actually starts them (bootstrap on).
pekko.management {
  http {
    hostname = "127.0.0.1"
    hostname = ${?ELEVATOR_POD_IP}
    port = 8558
  }
  cluster.bootstrap.contact-point-discovery {
    service-name = "elevator-app"
    discovery-method = kubernetes-api
  }
}
# Discover sibling pods by label (the deployment labels them app=elevator-app); the management
# container port must be named "management" (see k8s/app.yaml) so discovery finds 8558.
pekko.discovery.kubernetes-api.pod-label-selector = "app=%s"

# This single node carries every role, so the read-side projection (pinned to "read-model")
# runs here. In a multi-node setup you'd split: "write-model" nodes host the entities,
# "read-model" nodes host the projection — letting the two sides scale independently.
pekko.cluster.roles = ["write-model", "read-model"]

# Pekko's own internal log filter (separate from logback). Test profile raises it to DEBUG
# via the PEKKO_LOGLEVEL env var; default stays INFO. (last line wins in HOCON)
pekko.loglevel = INFO
pekko.loglevel = ${?PEKKO_LOGLEVEL}
pekko.loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
pekko.logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

pekko.serialization.jackson.jackson-modules += "pl.feelcodes.elevator.common.serializable.ElevatorDomainSerialization"

pekko.actor {
  allow-java-serialization = off
  serialization-bindings {
    # Commands live in the protocol module; persisted events in the events module; state in the logic module.
    "pl.feelcodes.elevator.common.protocol.CoordinatorProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.CoordinatorEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.CoordinatorLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.ManagerProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.ManagerEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.ManagerLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.ControllerProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.ControllerEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.ControllerLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.OperatorProtocol$Command" = jackson-cbor
  }
}

# Reactive Postgres journal + snapshots via pekko-persistence-r2dbc.
# The read-side projection queries this same journal by slice (see ElevatorStateProjection).
pekko.persistence {
  journal.plugin = "pekko.persistence.r2dbc.journal"
  snapshot-store.plugin = "pekko.persistence.r2dbc.snapshot"
}

pekko.persistence.r2dbc {
  dialect = "postgres"
  connection-factory {
    driver   = "postgres"
    host     = "localhost"
    host     = ${?ELEVATOR_PG_HOST}
    port     = 5432
    port     = ${?ELEVATOR_PG_PORT}
    database = "elevator"
    database = ${?ELEVATOR_PG_DATABASE}
    user     = "elevator"
    user     = ${?ELEVATOR_PG_USER}
    password = "elevator"
    password = ${?ELEVATOR_PG_PASSWORD}
  }
}

elevator {
  # Engine the entities run: "fast" (cheap ~instant moves) or "slow" (heavy CPU burn). Env sets the
  # startup value; the mounted ConfigMap file (engine-file) is polled at runtime for live switching.
  engine = "fast"
  engine = ${?ELEVATOR_ENGINE}

  # Mounted-ConfigMap file polled for live engine changes (no pod restart). Absent -> keep startup value.
  engine-file = "/etc/elevator-config/ELEVATOR_ENGINE"
  engine-file = ${?ELEVATOR_ENGINE_FILE}
}

elevator.kafka {
  # default first, env override second (last line wins in HOCON)
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?ELEVATOR_KAFKA_BOOTSTRAP_SERVERS}

  group-id = "elevator-app"
  group-id = ${?ELEVATOR_KAFKA_GROUP_ID}

  # calls in (api -> app); three state streams out (app -> api / console / bi)
  call-topic = "elevator-calls"
  call-topic = ${?ELEVATOR_KAFKA_CALL_TOPIC}

  state-topic = "elevator-state"
  state-topic = ${?ELEVATOR_KAFKA_STATE_TOPIC}

  order-state-topic = "elevator-order-state"
  order-state-topic = ${?ELEVATOR_KAFKA_ORDER_STATE_TOPIC}

  call-state-topic = "elevator-call-state"
  call-state-topic = ${?ELEVATOR_KAFKA_CALL_STATE_TOPIC}

  # Calls are drained from the call topic in ticks: up to call-batch-max-size calls, or every
  # call-batch-interval, whichever comes first, are handed to the Coordinator in one Handle.
  call-batch-max-size = 1000
  call-batch-max-size = ${?ELEVATOR_KAFKA_CALL_BATCH_MAX_SIZE}

  call-batch-interval = 200ms
  call-batch-interval = ${?ELEVATOR_KAFKA_CALL_BATCH_INTERVAL}
}
