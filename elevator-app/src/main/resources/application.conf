# Single-node Pekko cluster. No database — in-memory journal. Kafka on localhost.

pekko.actor.provider = cluster

pekko.remote.artery {
  transport = tcp
  canonical.hostname = "127.0.0.1"
  canonical.port = 2551
}

pekko.cluster.seed-nodes = ["pekko://elevator-cluster@127.0.0.1:2551"]
pekko.cluster.downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

pekko.loglevel = INFO
pekko.loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
pekko.logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

pekko.actor {
  allow-java-serialization = off
  serialization-bindings {
    "pl.feelcodes.elevator.app.actors.Coordinator$Command" = jackson-cbor
    "pl.feelcodes.elevator.app.actors.Coordinator$Ack" = jackson-cbor
    "pl.feelcodes.elevator.app.actors.Coordinator$Event" = jackson-cbor

    "pl.feelcodes.elevator.app.actors.Controller$Msg" = jackson-cbor
    "pl.feelcodes.elevator.app.actors.Controller$Event" = jackson-cbor
    "pl.feelcodes.elevator.app.actors.Controller$State" = jackson-cbor

    "pl.feelcodes.elevator.app.actors.Operator$Msg" = jackson-cbor
  }
}

pekko.persistence {
  journal.plugin = "pekko.persistence.journal.inmem"
  snapshot-store.plugin = "pekko.persistence.snapshot-store.local"
  snapshot-store.local.dir = "target/snapshots"
}

elevator.kafka {
  # default first, env override second (last line wins in HOCON)
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?ELEVATOR_KAFKA_BOOTSTRAP_SERVERS}

  group-id = "elevator-app"
  group-id = ${?ELEVATOR_KAFKA_GROUP_ID}

  state-topic = "elevator-state"
  state-topic = ${?ELEVATOR_KAFKA_STATE_TOPIC}

  command-topic = "elevator-commands"
  command-topic = ${?ELEVATOR_KAFKA_COMMAND_TOPIC}
}
