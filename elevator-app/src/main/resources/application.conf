# Pekko cluster: R2DBC Postgres journal + read-side projection; Kafka/Postgres on localhost
# (docker-compose.demo.yml). Two membership modes — LOCAL (default) static single-node seed on
# 127.0.0.1, or KUBERNETES (ELEVATOR_CLUSTER_BOOTSTRAP=on) where ElevatorApp starts Pekko
# Management + Cluster Bootstrap and clears seed-nodes so pods form one multi-node cluster.

pekko.actor.provider = cluster

elevator-blocking-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor.fixed-pool-size = 16
  throughput = 1
}

pekko.remote.artery {
  transport = tcp
  canonical.hostname = "127.0.0.1"
  canonical.hostname = ${?ELEVATOR_POD_IP}
  canonical.port = 2551
}

pekko.cluster.seed-nodes = ["pekko://elevator-cluster@127.0.0.1:2551"]
pekko.cluster.downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

pekko.cluster.min-nr-of-members = 1
pekko.cluster.min-nr-of-members = ${?ELEVATOR_CLUSTER_MIN_MEMBERS}

pekko.management {
  http {
    hostname = "127.0.0.1"
    hostname = ${?ELEVATOR_POD_IP}
    port = 8558
  }
  cluster.bootstrap.contact-point-discovery {
    service-name = "elevator-app"
    discovery-method = kubernetes-api
  }
}
pekko.discovery.kubernetes-api.pod-label-selector = "app=%s"

pekko.cluster.roles = ["write-model", "read-model"]

pekko.loglevel = INFO
pekko.loglevel = ${?PEKKO_LOGLEVEL}
pekko.loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
pekko.logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

pekko.serialization.jackson.jackson-modules += "pl.feelcodes.elevator.common.serializable.ElevatorDomainSerialization"

pekko.actor {
  allow-java-serialization = off
  serialization-bindings {
    "pl.feelcodes.elevator.common.protocol.CoordinatorProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.CoordinatorEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.CoordinatorLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.ManagerProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.ManagerEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.ManagerLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.ControllerProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.ControllerEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.ControllerLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.PassengerProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.events.PassengerEvents$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.logic.PassengerLogic$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.OperatorProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.protocol.DoormanProtocol$Command" = jackson-cbor

    "pl.feelcodes.elevator.app.actors.SuspendManager$Command" = jackson-cbor
    "pl.feelcodes.elevator.app.actors.SuspendManager$Decision" = jackson-cbor
  }
}

pekko.persistence {
  journal.plugin = "pekko.persistence.r2dbc.journal"
  snapshot-store.plugin = "pekko.persistence.r2dbc.snapshot"
}

pekko.persistence.r2dbc {
  dialect = "postgres"
  connection-factory {
    driver   = "postgres"
    host     = "localhost"
    host     = ${?ELEVATOR_PG_HOST}
    port     = 5432
    port     = ${?ELEVATOR_PG_PORT}
    database = "elevator"
    database = ${?ELEVATOR_PG_DATABASE}
    user     = "elevator"
    user     = ${?ELEVATOR_PG_USER}
    password = "elevator"
    password = ${?ELEVATOR_PG_PASSWORD}
  }
}

elevator {
  engine = "fast"
  engine = ${?ELEVATOR_ENGINE}

  engine-file = "/etc/elevator-config/ELEVATOR_ENGINE"
  engine-file = ${?ELEVATOR_ENGINE_FILE}

  door-dwell = 2 seconds
  door-dwell = ${?ELEVATOR_DOOR_DWELL}
}

elevator.kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?ELEVATOR_KAFKA_BOOTSTRAP_SERVERS}

  group-id = "elevator-app"
  group-id = ${?ELEVATOR_KAFKA_GROUP_ID}

  call-topic = "elevator-calls"
  call-topic = ${?ELEVATOR_KAFKA_CALL_TOPIC}

  board-topic = "elevator-board"
  board-topic = ${?ELEVATOR_KAFKA_BOARD_TOPIC}

  state-topic = "elevator-state"
  state-topic = ${?ELEVATOR_KAFKA_STATE_TOPIC}

  order-state-topic = "elevator-order-state"
  order-state-topic = ${?ELEVATOR_KAFKA_ORDER_STATE_TOPIC}

  call-state-topic = "elevator-call-state"
  call-state-topic = ${?ELEVATOR_KAFKA_CALL_STATE_TOPIC}

  door-state-topic = "elevator-door-state"
  door-state-topic = ${?ELEVATOR_KAFKA_DOOR_STATE_TOPIC}

  call-batch-max-size = 1000
  call-batch-max-size = ${?ELEVATOR_KAFKA_CALL_BATCH_MAX_SIZE}

  call-batch-interval = 200ms
  call-batch-interval = ${?ELEVATOR_KAFKA_CALL_BATCH_INTERVAL}
}
