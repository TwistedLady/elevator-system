# Single-node Pekko cluster. Reactive (R2DBC) Postgres journal + read-side projection.
# Kafka and Postgres on localhost (see docker-compose.demo.yml).

pekko.actor.provider = cluster

pekko.remote.artery {
  transport = tcp
  canonical.hostname = "127.0.0.1"
  canonical.port = 2551
}

pekko.cluster.seed-nodes = ["pekko://elevator-cluster@127.0.0.1:2551"]
pekko.cluster.downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

# This single node carries every role, so the read-side projection (pinned to "read-model")
# runs here. In a multi-node setup you'd split: "write-model" nodes host the entities,
# "read-model" nodes host the projection — letting the two sides scale independently.
pekko.cluster.roles = ["write-model", "read-model"]

# Pekko's own internal log filter (separate from logback). Test profile raises it to DEBUG
# via the PEKKO_LOGLEVEL env var; default stays INFO. (last line wins in HOCON)
pekko.loglevel = INFO
pekko.loglevel = ${?PEKKO_LOGLEVEL}
pekko.loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
pekko.logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

pekko.serialization.jackson.jackson-modules += "pl.feelcodes.elevator.app.DomainJacksonModule"

pekko.actor {
  allow-java-serialization = off
  serialization-bindings {
    # Command + Ack carry a Pekko ActorRef (the ask reply-to), so they stay in the app module.
    "pl.feelcodes.elevator.app.actors.Coordinator$Command" = jackson-cbor
    "pl.feelcodes.elevator.app.actors.Coordinator$Ack" = jackson-cbor
    # The rest of the protocol (events, state, the Pekko-free commands) lives in the protocol module.
    "pl.feelcodes.elevator.common.protocol.CoordinatorProtocol$Event" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.ControllerProtocol$Command" = jackson-cbor
    "pl.feelcodes.elevator.common.protocol.ControllerProtocol$Event" = jackson-cbor
    "pl.feelcodes.elevator.common.protocol.ControllerProtocol$State" = jackson-cbor

    "pl.feelcodes.elevator.common.protocol.OperatorProtocol$Command" = jackson-cbor
  }
}

# Reactive Postgres journal + snapshots via pekko-persistence-r2dbc.
# The read-side projection queries this same journal by slice (see ElevatorStateProjection).
pekko.persistence {
  journal.plugin = "pekko.persistence.r2dbc.journal"
  snapshot-store.plugin = "pekko.persistence.r2dbc.snapshot"
}

pekko.persistence.r2dbc {
  dialect = "postgres"
  connection-factory {
    driver   = "postgres"
    host     = "localhost"
    host     = ${?ELEVATOR_PG_HOST}
    port     = 5432
    port     = ${?ELEVATOR_PG_PORT}
    database = "elevator"
    database = ${?ELEVATOR_PG_DATABASE}
    user     = "elevator"
    user     = ${?ELEVATOR_PG_USER}
    password = "elevator"
    password = ${?ELEVATOR_PG_PASSWORD}
  }
}

elevator {
  # Which Operator class the entities run: "FastOperator" (cheap) or "SlowOperator" (heavy CPU
  # burn). Resolved by name via the inline match in ElevatorApp (not reflection). Env override
  # lets a ConfigMap flip it without rebuilding (last line wins in HOCON).
  operator-class = "FastOperator"
  operator-class = ${?ELEVATOR_OPERATOR_CLASS}
}

elevator.kafka {
  # default first, env override second (last line wins in HOCON)
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?ELEVATOR_KAFKA_BOOTSTRAP_SERVERS}

  group-id = "elevator-app"
  group-id = ${?ELEVATOR_KAFKA_GROUP_ID}

  state-topic = "elevator-state"
  state-topic = ${?ELEVATOR_KAFKA_STATE_TOPIC}

  command-topic = "elevator-commands"
  command-topic = ${?ELEVATOR_KAFKA_COMMAND_TOPIC}
}
