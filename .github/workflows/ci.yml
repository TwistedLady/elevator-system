name: Build & Test

# Build + test the polyglot reactor on every push/PR to main: Scala 3 domain, Pekko app,
# Spring api (Testcontainers IT), Rust console, Elm web, standalone Spark BI. PRs also prove
# the Docker images still build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  version-check:
    name: Version lockstep (all modules == VERSION)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare every module version to VERSION
        run: |
          python3 - <<'PY'
          import re, sys, json, xml.etree.ElementTree as ET
          V = open('VERSION').read().strip()
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          root = ET.parse('pom.xml').getroot()
          # The reactor version is the ${revision} property (CI-friendly single-source version).
          rootv = root.find('m:properties/m:revision', namespaces=ns).text
          biv = ET.parse('elevator-bi/pom.xml').getroot().findtext('m:version', namespaces=ns)
          got = {
            'VERSION':                 V,
            'pom.xml (revision)':      rootv,
            'elevator-bi/pom.xml':     biv,
            'Cargo.toml':              re.search(r'^version\s*=\s*"([^"]+)"', open('elevator-console-cli/Cargo.toml').read(), re.M).group(1),
            'package.json':            json.load(open('elevator-console-web/package.json'))['version'],
          }
          # NOTE: the Helm chart version is intentionally NOT in lockstep — it is packaging metadata.
          # The deployed app version is the image tag (git tag vX.Y.Z), set by cd.yml. See README.md#versioning.
          for k, v in got.items():
              print(f"  {k:32} {v}")
          bad = {k: v for k, v in got.items() if v != V}
          sys.exit(f"::error::version drift vs VERSION={V}: {bad}") if bad else print(f"OK — all modules == {V}")
          PY

  jvm:
    name: Scala/Java · Maven (unit + Testcontainers IT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate reactor & dependency convergence
        run: ./mvnw -B -ntp -DskipTests validate

      - name: Build & unit tests
        run: ./mvnw -B -ntp install -DskipITs

      - name: Integration tests (Testcontainers)
        run: ./mvnw -B -ntp verify -Dsurefire.skip=true

      - name: Publish test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: "**/target/*-reports/*.xml"
          if-no-files-found: ignore
          retention-days: 7

  rust:
    name: Rust console · Cargo (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elevator-console-cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: elevator-console-cli

      - name: Format (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release

  bi:
    name: Spark BI · Maven (Scala 2.12, standalone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build uber jar + ScalaTest
        run: ./mvnw -B -ntp -f elevator-bi/pom.xml package

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: elevator-bi
          file: elevator-bi/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  images:
    name: Docker images build (no push)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: elevator-app,         context: .,                    file: elevator-app/Dockerfile }
          - { name: elevator-api,         context: .,                    file: elevator-api/Dockerfile }
          - { name: elevator-console-web, context: ., file: elevator-console-web/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: End-to-end (compose boot + console sim)
    # Boots the WHOLE backend in containers and drives it with the real Rust console, so a broken
    # sim or console can never reach main. The console itest fires a simulation and asserts every
    # call reaches DONE; its kubectl log-checks are skipped when kubectl is absent (here it is).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: elevator-console-cli

      - name: Build the console
        working-directory: elevator-console-cli
        run: cargo build --release

      - name: Boot the backend (kafka + postgres + app + api)
        run: docker compose -f docker-compose.demo.yml up -d --build

      - name: Wait for the api to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "api is UP"; exit 0
            fi
            sleep 5
          done
          echo "::error::api did not become healthy in time"; exit 1

      - name: Drive a simulation through the console (itest)
        env:
          ELEVATOR_API: http://localhost:8080
        run: ./elevator-console-cli/target/release/elevator-console-cli itest --timeout 180 --out itest-report.json

      - name: Backend logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yml logs --tail=250 app api

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.demo.yml down -v
