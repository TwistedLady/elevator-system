name: Build & Test

# Validates every change to the polyglot reactor:
#   - elevator-common-* (Scala 3 domain/logic)   - unit tested
#   - elevator-app       (Pekko cluster)          - unit tested (actor recovery)
#   - elevator-api       (Spring)                 - unit + Testcontainers IT
#   - elevator-console-cli   (Rust/Cargo)             - fmt + clippy + test
#   - elevator-console-web (Elm)                  - image build proven on PRs
#   - elevator-bi        (Spark, Scala 2.12, standalone) - uber jar + ScalaTest + image
# On PRs it also proves all three JVM/web Docker images still build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The lockstep guard: every module's version MUST equal the repo-root VERSION file. Fails the
  # build on drift (so app can never be 1.0.0 while api is 0.1.0). Bump all at once with
  # `mvn versions:set -DnewVersion=X` + edit Cargo.toml / package.json / Chart.yaml / VERSION.
  version-check:
    name: Version lockstep (all modules == VERSION)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare every module version to VERSION
        run: |
          python3 - <<'PY'
          import re, sys, json, xml.etree.ElementTree as ET
          V = open('VERSION').read().strip()
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          pomv = lambda p: ET.parse(p).getroot().findtext('m:version', namespaces=ns)
          got = {
            'VERSION':                 V,
            'pom.xml':                 pomv('pom.xml'),
            'elevator-bi/pom.xml':     pomv('elevator-bi/pom.xml'),
            'Cargo.toml':              re.search(r'^version\s*=\s*"([^"]+)"', open('elevator-console-cli/Cargo.toml').read(), re.M).group(1),
            'package.json':            json.load(open('elevator-console-web/package.json'))['version'],
            'charts/elevator/Chart.yaml': re.search(r'^version:\s*(\S+)', open('charts/elevator/Chart.yaml').read(), re.M).group(1),
          }
          for k, v in got.items():
              print(f"  {k:32} {v}")
          bad = {k: v for k, v in got.items() if v != V}
          sys.exit(f"::error::version drift vs VERSION={V}: {bad}") if bad else print(f"OK — all modules == {V}")
          PY

  jvm:
    name: Scala/Java · Maven (unit + Testcontainers IT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Enforcer requireUpperBoundDeps + POM sanity across the 12-module reactor.
      - name: Validate reactor & dependency convergence
        run: ./mvnw -B -ntp -DskipTests validate

      # Compiles Scala 3 (elevator-common-*) + elevator-app/elevator-api, runs the
      # surefire unit tests (logic, strategy, event evolution, actor recovery,
      # serialization) and installs artifacts. IT skipped here for a clean signal.
      - name: Build & unit tests
        run: ./mvnw -B -ntp install -DskipITs

      # Runs only the failsafe *IT (ElevatorStateFlowIT): boots Spring and spins up
      # Postgres + Kafka via Testcontainers (ubuntu-latest ships a Docker daemon).
      - name: Integration tests (Testcontainers)
        run: ./mvnw -B -ntp verify -Dsurefire.skip=true

      - name: Publish test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: "**/target/*-reports/*.xml"
          if-no-files-found: ignore
          retention-days: 7

  rust:
    name: Rust console · Cargo (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elevator-console-cli
    steps:
      - uses: actions/checkout@v4

      # No system libraries needed: the console is HTTP-only (ureq + rustls/ring),
      # so there's nothing to apt-install before building.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: elevator-console-cli

      - name: Format (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      # The demo and the pre-commit itest run the release binary; make sure it builds.
      - name: Release build
        run: cargo build --release

  bi:
    name: Spark BI · Maven (Scala 2.12, standalone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # elevator-bi is a STANDALONE module (Scala 2.12 / Spark), deliberately not in the
      # Scala 3 reactor. Build it on its own pom. It targets Java 17.
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build uber jar + ScalaTest
        run: ./mvnw -B -ntp -f elevator-bi/pom.xml package

      # buildx (docker-container driver) is required for the gha cache backend below;
      # the default docker driver can't export cache.
      - uses: docker/setup-buildx-action@v3

      # Prove the image builds (the Dockerfile packages the uber jar just built).
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: elevator-bi
          file: elevator-bi/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  images:
    name: Docker images build (no push)
    # PR-only smoke: prove the Dockerfiles build. On main, Release & Deploy pushes them.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # elevator-console-web builds from its own dir (self-contained npm project);
      # the JVM images build from the repo root. Carry context + file per entry.
      matrix:
        include:
          - { name: elevator-app,         context: .,                    file: elevator-app/Dockerfile }
          - { name: elevator-api,         context: .,                    file: elevator-api/Dockerfile }
          - { name: elevator-console-web, context: ., file: elevator-console-web/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
