name: Console Release

# Publishes the Rust console as ready-to-install artifacts. Triggered by a console-scoped tag
# (this is a polyglot monorepo, so the console has its own tag namespace):
#
#   git tag console-v0.1.0 && git push origin console-v0.1.0
#
# Produces, and attaches to a GitHub Release:
#   - cli-console-<tag>-x86_64-linux.tar.gz  (stripped release binary + its sha256)
#   - cli-console_<ver>-1_amd64.deb          (Debian package)

on:
  push:
    tags: ["cli-console-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish console artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli-console
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli-console

      # Fast fail before packaging: the release must be green.
      - name: Test
        run: cargo test

      - name: Build stripped release binary
        run: cargo build --release

      - name: Package tarball + checksum
        run: |
          ver="${GITHUB_REF_NAME:-console-vdev}"
          dir="cli-console-${ver}-x86_64-linux"
          mkdir -p "dist/${dir}"
          cp target/release/cli-console README.md LICENSE "dist/${dir}/"
          tar -C dist -czf "dist/${dir}.tar.gz" "${dir}"
          cd dist && sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256"

      - name: Build Debian package
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build
          cp target/debian/*.deb dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli-console/dist/*.tar.gz
            cli-console/dist/*.sha256
            cli-console/dist/*.deb
          generate_release_notes: true
