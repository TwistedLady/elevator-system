name: PR title (Conventional Commits)

# The repo squash-merges, so a PR title becomes the commit release-please reads for the next version.
# Enforce Conventional Commits on the title (feat->minor, fix->patch, "!"=breaking; rest cut no release).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start lower-case, e.g. "feat: add order batching".
