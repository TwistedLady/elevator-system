name: Release & Deploy

# Runs only after "Build & Test" succeeds on main (never ships a red build), or
# manually. Publishes both images to GHCR, then rolls them onto the cluster in the
# order the Pekko-cluster app actually needs: RBAC + config, then the stateful
# backends (Postgres journal / Kafka), then the app + API pinned to this commit.
on:
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish images → GHCR
    # Skip unless the triggering build passed (workflow_dispatch has no run to check).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image coordinates
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build & push elevator-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-app:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push elevator-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-api:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Self-contained npm project → its own build context (not the repo root).
      - name: Build & push elevator-web-console
        uses: docker/build-push-action@v6
        with:
          context: elevator-web-console
          file: elevator-web-console/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-web-console:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-web-console:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → Kubernetes (Pekko cluster)
    needs: publish
    # Self-hosted: the only cluster is a local kind (127.0.0.1), which GitHub's
    # cloud runners cannot reach. Register a runner on the kind host (see
    # docs/CICD.md). The publish job above stays on cloud runners.
    runs-on: self-hosted
    # The `dev` environment gates this: add required reviewers for a manual
    # approval, and store KUBECONFIG (+ optional GHCR_PULL_TOKEN) as env secrets.
    environment: dev
    env:
      OWNER: ${{ needs.publish.outputs.owner }}
      TAG: ${{ needs.publish.outputs.tag }}
      # `secrets` cannot be referenced in an `if:` — map it to env and test that.
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # KUBECONFIG secret = your kubeconfig, base64-encoded:
      #   kubectl config view --raw --minify --flatten | base64 -w0
      # Written to a job-local temp file (never $HOME/.kube/config) so it does not
      # clobber the self-hosted runner's own kubeconfig.
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$RUNNER_TEMP/kubeconfig" config current-context

      # Only needed if the GHCR packages are private; skipped otherwise. Use a PAT
      # with read:packages (not the short-lived GITHUB_TOKEN). Referenced by both
      # deployments via imagePullSecrets: ghcr-pull.
      - name: Create GHCR pull secret
        if: ${{ env.GHCR_PULL_TOKEN != '' }}
        run: |
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username='${{ github.repository_owner }}' \
            --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      # 1) Cluster discovery RBAC (Pekko bootstrap lists sibling pods), app/api
      #    ConfigMaps (fast/slow mode + Kafka wiring), and the Postgres DDL ConfigMap.
      - name: Apply RBAC, config & DB schema
        run: kubectl apply -f k8s/rbac.yaml -f k8s/configmap.yaml -f k8s/postgres-init.yaml

      # 2) Stateful backends first — the event journal and Kafka must be reachable
      #    before the app cluster forms and starts consuming.
      - name: Apply stateful backends (Postgres, Kafka)
        run: |
          kubectl apply -f k8s/postgres.yaml -f k8s/kafka.yaml
          kubectl rollout status statefulset/postgres --timeout=5m
          kubectl rollout status deployment/kafka --timeout=5m

      # 3) App + API, pinned to the image built from this exact commit.
      - name: Deploy app & API (pin image to commit)
        run: |
          kubectl apply -f k8s/app.yaml -f k8s/api.yaml
          kubectl set image deployment/elevator-app elevator-app="ghcr.io/${OWNER}/elevator-app:${TAG}"
          kubectl set image deployment/elevator-api elevator-api="ghcr.io/${OWNER}/elevator-api:${TAG}"

      # Rolling update is maxUnavailable:0; the app's startup probe tolerates the
      # cluster-form + journal-recovery time, so give it a generous window.
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/elevator-app --timeout=8m
          kubectl rollout status deployment/elevator-api --timeout=5m

      # 4) Web console (nginx serving the bundle + proxying to the api). Apply the
      #    NetworkPolicies too so the kubelet readiness probe is allowed under Calico.
      - name: Deploy web console (pin image to commit)
        run: |
          kubectl apply -f k8s/network-policies.yaml -f k8s/web-console.yaml
          kubectl set image deployment/elevator-web-console elevator-web-console="ghcr.io/${OWNER}/elevator-web-console:${TAG}"
          kubectl rollout status deployment/elevator-web-console --timeout=3m

      - name: Deployment summary
        if: ${{ !cancelled() }}
        run: kubectl get pods -o wide
