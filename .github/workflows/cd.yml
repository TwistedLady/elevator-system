name: Release & Deploy

# TAG-ONLY: a version tag (v*.*.*) is the ONLY thing that publishes + deploys. Pushing to main just
# runs Build & Test (ci.yml) — it does NOT deploy, so the cluster always reflects the last released
# version. A tag publishes version-tagged images to GHCR, creates a GitHub Release, and deploys the
# chart (charts/elevator) pinned to that version. The cluster itself (kind + Calico + the
# elevator-api-tls / ghcr-pull secrets) is provisioned separately, once, by `terraform apply`.
on:
  push:
    tags: ['v*.*.*']          # the version tag = the release (images :X.Y.Z + GitHub Release + deploy)
  workflow_dispatch:          # manual escape hatch: a sha-tagged deploy of the selected branch

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write             # create the GitHub Release on a version tag
  packages: write

jobs:
  publish:
    name: Publish images → GHCR
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      tag: ${{ steps.meta.outputs.tag }}
      release: ${{ steps.meta.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image coordinates
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            # release: tag images with the one project version (v1.0.0 -> 1.0.0)
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            # rolling main build: tag by commit sha
            sha="${{ github.sha }}"
            echo "tag=sha-${sha:0:12}" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push elevator-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-app:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push elevator-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-api:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Repo-root context (like api/app) so the shared VERSION file reaches gen-version.mjs.
      - name: Build & push elevator-console-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-console-web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-console-web:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-console-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # elevator-bi is a standalone Scala 2.12 / Spark module: build the uber jar on the host
      # (JDK 17), then the Dockerfile packages it onto the apache/spark base image.
      - name: Set up JDK 17 (Temurin) — for the Spark uber jar
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build elevator-bi uber jar
        run: ./mvnw -B -ntp -f elevator-bi/pom.xml -DskipTests package

      - name: Build & push elevator-bi
        uses: docker/build-push-action@v6
        with:
          context: elevator-bi
          file: elevator-bi/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-bi:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-bi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On a version tag only: the tag must equal the VERSION file. The GitHub Release is normally
      # created by release-please (.github/workflows/release.yml); this step only fills it in for a
      # hand-pushed tag, and no-ops if the release already exists.
      # The GHCR packages auto-link to the repo via each image's org.opencontainers.image.source label.
      - name: Ensure GitHub Release
        if: ${{ steps.meta.outputs.release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "v$(cat VERSION)" = "${GITHUB_REF_NAME}" \
            || { echo "::error::tag ${GITHUB_REF_NAME} != v$(cat VERSION) (bump VERSION or fix the tag)"; exit 1; }
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "release ${GITHUB_REF_NAME} already exists (release-please) — nothing to do"
          else
            gh release create "${GITHUB_REF_NAME}" --title "elevator ${GITHUB_REF_NAME}" --generate-notes
          fi

  deploy:
    name: Deploy → Kubernetes (Pekko cluster)
    needs: publish
    # Self-hosted: the only cluster is a local kind (127.0.0.1), which GitHub's
    # cloud runners cannot reach. Register a runner on the kind host (see
    # README.md#ci--cd). The publish job above stays on cloud runners.
    runs-on: self-hosted
    # The `dev` environment gates this: add required reviewers for a manual
    # approval, and store KUBECONFIG (+ optional GHCR_PULL_TOKEN) as env secrets.
    environment: dev
    env:
      OWNER: ${{ needs.publish.outputs.owner }}
      TAG: ${{ needs.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      # The self-hosted runner lives on the kind host, so use its OWN kubeconfig
      # (~/.kube/config) rather than a secret: kind rewrites it on every recreate, so
      # this survives the volatile API-server port with no secret to keep in sync.
      - name: Configure kubectl
        run: |
          # kubectl + kind live in ~/.local/bin on the host, which the runner service's PATH
          # doesn't include — add it so this and later steps can find them.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          PATH="$HOME/.local/bin:$PATH" kubectl config current-context

      # The GHCR packages are private, and a local kind cluster can't pull them without
      # a registry secret. Simpler on the host: log in with the job's GITHUB_TOKEN, pull
      # each image, and `kind load` it straight into the cluster's containerd. The
      # sha-tagged refs then resolve locally (imagePullPolicy IfNotPresent) — no cluster
      # pull, no public packages, no pull secret.
      - name: Pull images & load into kind
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for img in elevator-app elevator-api elevator-console-web; do
            ref="ghcr.io/${OWNER}/${img}:${TAG}"
            docker pull "$ref"
            kind load docker-image "$ref" --name elevator
          done

      # Deploy the whole system as ONE Helm release, pinned to this commit's images. Helm renders
      # the chart (RBAC, ConfigMaps, Postgres/Kafka, app/api, NetworkPolicies, web console); --wait
      # blocks until every rollout is Ready. The app's generous startup probe tolerates Helm's
      # kind-based apply order (it retries until Postgres/Kafka are up), so no manual staging needed.
      # BI + one-shot seeding stay off in CD — turn BI on out-of-band with
      #   helm upgrade elevator charts/elevator --reuse-values --set bi.enabled=true
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Deploy with Helm (pin images to this commit)
        run: |
          helm upgrade --install elevator charts/elevator \
            --namespace default \
            --set global.images.app="ghcr.io/${OWNER}/elevator-app:${TAG}" \
            --set global.images.api="ghcr.io/${OWNER}/elevator-api:${TAG}" \
            --set global.images.consoleWeb="ghcr.io/${OWNER}/elevator-console-web:${TAG}" \
            --set bi.enabled=false \
            --set seed.enabled=false \
            --wait --timeout 10m

      - name: Deployment summary
        if: ${{ !cancelled() }}
        run: kubectl get pods -o wide
