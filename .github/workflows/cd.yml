name: Release & Deploy

# Runs only after "Build & Test" succeeds on main (never ships a red build), or
# manually. Publishes both images to GHCR, then rolls them onto the cluster in the
# order the Pekko-cluster app actually needs: RBAC + config, then the stateful
# backends (Postgres journal / Kafka), then the app + API pinned to this commit.
on:
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish images → GHCR
    # Skip unless the triggering build passed (workflow_dispatch has no run to check).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image coordinates
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build & push elevator-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-app:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push elevator-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: elevator-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-api:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Self-contained npm project → its own build context (not the repo root).
      - name: Build & push elevator-console-web
        uses: docker/build-push-action@v6
        with:
          context: elevator-console-web
          file: elevator-console-web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-console-web:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-console-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # elevator-bi is a standalone Scala 2.12 / Spark module: build the uber jar on the host
      # (JDK 17), then the Dockerfile packages it onto the apache/spark base image.
      - name: Set up JDK 17 (Temurin) — for the Spark uber jar
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build elevator-bi uber jar
        run: ./mvnw -B -ntp -f elevator-bi/pom.xml -DskipTests package

      - name: Build & push elevator-bi
        uses: docker/build-push-action@v6
        with:
          context: elevator-bi
          file: elevator-bi/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-bi:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-bi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → Kubernetes (Pekko cluster)
    needs: publish
    # Self-hosted: the only cluster is a local kind (127.0.0.1), which GitHub's
    # cloud runners cannot reach. Register a runner on the kind host (see
    # docs/CICD.md). The publish job above stays on cloud runners.
    runs-on: self-hosted
    # The `dev` environment gates this: add required reviewers for a manual
    # approval, and store KUBECONFIG (+ optional GHCR_PULL_TOKEN) as env secrets.
    environment: dev
    env:
      OWNER: ${{ needs.publish.outputs.owner }}
      TAG: ${{ needs.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # The self-hosted runner lives on the kind host, so use its OWN kubeconfig
      # (~/.kube/config) rather than a secret: kind rewrites it on every recreate, so
      # this survives the volatile API-server port with no secret to keep in sync.
      - name: Configure kubectl
        run: |
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          kubectl config current-context

      # The GHCR packages are private, and a local kind cluster can't pull them without
      # a registry secret. Simpler on the host: log in with the job's GITHUB_TOKEN, pull
      # each image, and `kind load` it straight into the cluster's containerd. The
      # sha-tagged refs then resolve locally (imagePullPolicy IfNotPresent) — no cluster
      # pull, no public packages, no pull secret.
      - name: Pull images & load into kind
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for img in elevator-app elevator-api elevator-console-web; do
            ref="ghcr.io/${OWNER}/${img}:${TAG}"
            docker pull "$ref"
            kind load docker-image "$ref" --name elevator
          done

      # 1) Cluster discovery RBAC (Pekko bootstrap lists sibling pods), app/api
      #    ConfigMaps (fast/slow mode + Kafka wiring), and the Postgres DDL ConfigMap.
      - name: Apply RBAC, config & DB schema
        run: kubectl apply -f k8s/rbac.yaml -f k8s/configmap.yaml -f k8s/postgres-init.yaml

      # 2) Stateful backends first — the event journal and Kafka must be reachable
      #    before the app cluster forms and starts consuming.
      - name: Apply stateful backends (Postgres, Kafka)
        run: |
          kubectl apply -f k8s/postgres.yaml -f k8s/kafka.yaml
          kubectl rollout status statefulset/postgres --timeout=5m
          kubectl rollout status deployment/kafka --timeout=5m

      # 3) App + API, pinned to the image built from this exact commit.
      - name: Deploy app & API (pin image to commit)
        run: |
          kubectl apply -f k8s/app.yaml -f k8s/api.yaml
          kubectl set image deployment/elevator-app elevator-app="ghcr.io/${OWNER}/elevator-app:${TAG}"
          kubectl set image deployment/elevator-api elevator-api="ghcr.io/${OWNER}/elevator-api:${TAG}"

      # Rolling update is maxUnavailable:0; the app's startup probe tolerates the
      # cluster-form + journal-recovery time, so give it a generous window.
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/elevator-app --timeout=8m
          kubectl rollout status deployment/elevator-api --timeout=5m

      # 4) Web console (nginx serving the bundle + proxying to the api). Apply the
      #    NetworkPolicies too so the kubelet readiness probe is allowed under Calico.
      - name: Deploy web console (pin image to commit)
        run: |
          kubectl apply -f k8s/network-policies.yaml -f k8s/console-web.yaml
          kubectl set image deployment/elevator-console-web elevator-console-web="ghcr.io/${OWNER}/elevator-console-web:${TAG}"
          kubectl rollout status deployment/elevator-console-web --timeout=3m

      - name: Deployment summary
        if: ${{ !cancelled() }}
        run: kubectl get pods -o wide
