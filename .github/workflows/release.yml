name: Release

# Automatic versioning via release-please + Conventional Commits. Each push to main updates a release
# PR bumping VERSION + every module + CHANGELOG; merging it tags vX.Y.Z and triggers cd.yml to deploy.
# Needs a PAT (RELEASE_PLEASE_TOKEN) so the pushed tag fires cd.yml — GITHUB_TOKEN-pushed tags don't.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
