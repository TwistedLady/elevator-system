name: Console Release

# Publishes the Rust console on every release-please tag (v*.*.*) — and a console-only tag if ever
# cut: a GitHub Release (tarball + sha256, .deb) plus a GHCR image
# ghcr.io/<owner>/elevator-console-cli:<ver> and :latest.
on:
  push:
    tags:
      - "v*.*.*"
      - "elevator-console-cli-v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & publish console artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elevator-console-cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: elevator-console-cli

      - name: Test
        run: cargo test

      - name: Build stripped release binary
        run: cargo build --release

      - id: meta
        name: Compute image coordinates
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          ver="${GITHUB_REF_NAME#elevator-console-cli-v}"   # strip console-only prefix if present
          ver="${ver#v}"                                    # strip the leading v on release-please tags
          echo "ver=${ver}" >> "$GITHUB_OUTPUT"

      - name: Package tarball + checksum
        run: |
          dir="${GITHUB_REF_NAME:-elevator-console-cli-vdev}-x86_64-linux"
          mkdir -p "dist/${dir}"
          cp target/release/elevator-console-cli README.md LICENSE "dist/${dir}/"
          tar -C dist -czf "dist/${dir}.tar.gz" "${dir}"
          cd dist && sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256"

      - name: Build Debian package
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build
          cp target/debian/*.deb dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            elevator-console-cli/dist/*.tar.gz
            elevator-console-cli/dist/*.sha256
            elevator-console-cli/dist/*.deb
          generate_release_notes: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: elevator-console-cli
          file: elevator-console-cli/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-console-cli:${{ steps.meta.outputs.ver }}
            ghcr.io/${{ steps.meta.outputs.owner }}/elevator-console-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
