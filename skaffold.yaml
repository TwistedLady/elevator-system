# One Helm release = the whole system on a kind cluster. Local build push=false, so Skaffold loads
# images straight into kind's containerd (no `kind load`, no registry). app/api/console-web build from
# the repo-root context; console-cli from its own dir (bundles the CA Terraform wrote — `terraform
# apply` first). values-dev.yaml trims to single-node (api:1, BI off); profiles: `-p bi` adds Spark BI,
# `-p full` is the production-shaped api:2 + BI (needs >1 node's CPU).
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: elevator

build:
  local:
    push: false
    useBuildkit: true
  artifacts:
    - image: elevator-app
      context: .
      docker:
        dockerfile: elevator-app/Dockerfile
    - image: elevator-api
      context: .
      docker:
        dockerfile: elevator-api/Dockerfile
    - image: elevator-console-web
      context: .
      docker:
        dockerfile: elevator-console-web/Dockerfile
    - image: elevator-console-cli
      context: elevator-console-cli
      docker:
        dockerfile: Dockerfile

manifests:
  helm:
    releases:
      - name: elevator
        chartPath: charts/elevator
        valuesFiles:
          - charts/elevator/values-dev.yaml
        setValueTemplates:
          global.images.app: '{{.IMAGE_FULLY_QUALIFIED_elevator_app}}'
          global.images.api: '{{.IMAGE_FULLY_QUALIFIED_elevator_api}}'
          global.images.consoleWeb: '{{.IMAGE_FULLY_QUALIFIED_elevator_console_web}}'
          global.images.consoleCli: '{{.IMAGE_FULLY_QUALIFIED_elevator_console_cli}}'
        setValues: {}

deploy:
  helm: {}

portForward:
  - resourceType: service
    resourceName: elevator-api
    port: 8080
    localPort: 8080
  - resourceType: service
    resourceName: elevator-console-web
    port: 80
    localPort: 8081

profiles:
  - name: bi
    patches:
      - op: add
        path: /build/artifacts/-
        value:
          image: elevator-bi
          custom:
            buildCommand: mvn -f elevator-bi/pom.xml -q -DskipTests package && docker build -t $IMAGE -f elevator-bi/Dockerfile elevator-bi
            dependencies:
              paths:
                - elevator-bi/src
                - elevator-bi/pom.xml
                - elevator-bi/Dockerfile
                - elevator-bi/conf
      - op: add
        path: /manifests/helm/releases/0/setValueTemplates/global.images.bi
        value: '{{.IMAGE_FULLY_QUALIFIED_elevator_bi}}'
      - op: add
        path: /manifests/helm/releases/0/setValues/bi.enabled
        value: "true"

  - name: full
    patches:
      - op: replace
        path: /manifests/helm/releases/0/valuesFiles/0
        value: charts/elevator/values.yaml
