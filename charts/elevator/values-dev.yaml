# Single-node kind dev overlay (Skaffold default): api:1, BI off, NodePort so the host reaches api at
# localhost:8080. app stays 2 for the Pekko cluster (min-members=2). Turn BI on with `skaffold run -p bi`.
api:
  replicas: 1
  serviceType: NodePort
  nodePort: 30080

app:
  replicas: 2

bi:
  enabled: false
