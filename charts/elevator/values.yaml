# Full-system defaults (api:2, app:2, web+BI+seed on); Skaffold layers values-dev.yaml for single-node kind.
# global.* auto-propagates to every subchart. Passwords are demo-only — use a Secret in prod.
global:
  images:
    app: elevator-app:local
    api: elevator-api:local
    consoleWeb: elevator-console-web:local
    bi: elevator-bi:local
    consoleCli: elevator-console-cli:local
    kafka: apache/kafka:3.8.1
    postgres: postgres:17
    pullPolicy: IfNotPresent
  imagePullSecret: ghcr-pull
  nodeCidr: "172.20.0.0/16"
  kafka:
    storage: "2Gi"
    bootstrap: "kafka:9092"
    callTopic: "elevator-calls"
    stateTopic: "elevator-state"
    orderStateTopic: "elevator-order-state"
    callStateTopic: "elevator-call-state"
    doorStateTopic: "elevator-door-state"
    groupId: "elevator-app"
  postgres:
    host: "postgres"
    database: "elevator"
    user: "elevator"
    password: "elevator"
    storage: "1Gi"

app:
  replicas: 2

api:
  replicas: 2
  tlsSecret: elevator-api-tls
  serviceType: NodePort
  nodePort: 30080

config:
  maxFloor: 15
  elevators: "e1,e2,e3,e4,e5,e6,e7,e8,e9,e10"
  engine: "fast"
  springProfile: "prod"

console-web:
  enabled: true
  replicas: 1
  serviceType: NodePort
  nodePort: 30081

bi:
  enabled: true
  schedule: "*/15 * * * *"
  logsHostPath: "/mnt/elevator-bi-logs"
  parquetHostPath: "/mnt/elevator-bi-parquet"

seed:
  enabled: true
  count: 300
  apiUrl: "https://elevator-api:8080"
