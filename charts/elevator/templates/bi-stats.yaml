{{- if .Values.bi.enabled }}
# SEPARATE Postgres for analytics (BI) — isolated from the operational `postgres`. Spark WRITES the
# stats here; the api READS them via a dedicated datasource. Reachable at "postgres-stats:5432".
apiVersion: v1
kind: Service
metadata:
  name: postgres-stats
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: postgres-stats
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stats
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  serviceName: postgres-stats
  replicas: 1
  selector:
    matchLabels:
      app: postgres-stats
  template:
    metadata:
      labels:
        app: postgres-stats
        part-of: elevator
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB, value: {{ .Values.bi.stats.database | quote }} }
            - { name: POSTGRES_USER, value: {{ .Values.postgres.user | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.postgres.password | quote }} }
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.bi.stats.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.bi.stats.database | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: init
          configMap:
            name: postgres-stats-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.bi.stats.storage | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-stats-init
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
data:
  01-elevator-mileage.sql: |
    -- Analytics (BI) store — SEPARATE postgres-stats database (elevator_stats).
    -- Maintained by the Spark mileage job: one row per elevator = cumulative floors travelled.
    CREATE TABLE IF NOT EXISTS elevator_mileage (
      elevator_name    VARCHAR(255) PRIMARY KEY,
      floors_travelled BIGINT       NOT NULL,
      updated_at       TIMESTAMPTZ  NOT NULL DEFAULT now()
    );
  02-elevator-orders-served.sql: |
    -- Analytics (BI) store — SEPARATE postgres-stats database (elevator_stats).
    -- Maintained by the Spark orders-served job: one row per elevator = times it reached an ordered floor.
    CREATE TABLE IF NOT EXISTS elevator_orders_served (
      elevator_name VARCHAR(255) PRIMARY KEY,
      orders_served BIGINT       NOT NULL,
      updated_at    TIMESTAMPTZ  NOT NULL DEFAULT now()
    );
{{- end }}
