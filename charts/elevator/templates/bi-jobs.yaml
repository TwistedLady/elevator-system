{{- if .Values.bi.enabled }}
# BI job config (12-factor env). Matches in-cluster service names.
apiVersion: v1
kind: ConfigMap
metadata:
  name: elevator-bi-config
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
data:
  ELEVATOR_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrap | quote }}
  ELEVATOR_KAFKA_STATE_TOPIC: {{ .Values.kafka.stateTopic | quote }}
  ELEVATOR_BI_STARTING_OFFSETS: "earliest"
  ELEVATOR_BI_CHECKPOINT: "file:///checkpoint"
  ELEVATOR_BI_TRIGGER: "10 seconds"
  ELEVATOR_BI_STATS_JDBC_URL: "jdbc:postgresql://{{ .Values.bi.stats.host }}:5432/{{ .Values.bi.stats.database }}"
  ELEVATOR_BI_SOURCE_JDBC_URL: "jdbc:postgresql://{{ .Values.postgres.host }}:5432/{{ .Values.postgres.database }}"
  ELEVATOR_PG_USER: {{ .Values.postgres.user | quote }}
  ELEVATOR_PG_PASSWORD: {{ .Values.postgres.password | quote }}
  ELEVATOR_BI_TABLE: "elevator_mileage"
  ELEVATOR_BI_ORDER_STATUS_TABLE: "order_status"
  ELEVATOR_BI_SERVED_TABLE: "elevator_orders_served"
  ELEVATOR_BI_SERVED_INTERVAL: "30"
---
# RBAC for Spark-on-Kubernetes: the driver creates/watches/deletes its executor pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elevator-bi-spark
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: elevator-bi-spark
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elevator-bi-spark
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
subjects:
  - kind: ServiceAccount
    name: elevator-bi-spark
roleRef:
  kind: Role
  name: elevator-bi-spark
  apiGroup: rbac.authorization.k8s.io
---
# Additive NetworkPolicies (a UNION with the base): bi<->bi RPC, bi->kafka, bi->postgres.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bi-internal
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: elevator-bi }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
---
# postgres-stats: 5432 only from the api (reads) + the Spark BI jobs (writes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-stats-internal
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: postgres-stats }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 5432 }
---
# The Spark mileage job (streaming) — this Deployment pod IS the Spark driver (client mode); it
# spark-submits against the in-cluster API server, spawning executor pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-mileage
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
spec:
  replicas: 1
  strategy:
    type: Recreate            # one driver at a time — must not race the old for the checkpoint
  selector:
    matchLabels: { app: elevator-bi, role: driver }
  template:
    metadata:
      labels: { app: elevator-bi, role: driver, part-of: elevator }
    spec:
      serviceAccountName: elevator-bi-spark
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-dirs
          image: {{ .Values.images.bi }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["sh", "-c", "mkdir -p /checkpoint/spark-events /opt/elevator-bi/logs && chmod -R 0777 /checkpoint /opt/elevator-bi/logs"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - { name: checkpoint, mountPath: /checkpoint }
            - { name: logs, mountPath: /opt/elevator-bi/logs }
      containers:
        - name: driver
          image: {{ .Values.images.bi }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef: { name: elevator-bi-config }
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: HOME, value: "/tmp" }
            - { name: SPARK_LOCAL_DIRS, value: "/tmp" }
          command: ["/opt/spark/bin/spark-submit"]
          args:
            - "--master"
            - "k8s://https://kubernetes.default.svc:443"
            - "--deploy-mode"
            - "client"
            - "--name"
            - "elevator-mileage"
            - "--class"
            - "pl.feelcodes.elevator.bi.MileageJob"
            - "--conf"
            - "spark.kubernetes.namespace=default"
            - "--conf"
            - "spark.kubernetes.container.image={{ .Values.images.bi }}"
            - "--conf"
            - "spark.kubernetes.container.image.pullPolicy={{ .Values.images.pullPolicy }}"
            - "--conf"
            - "spark.kubernetes.authenticate.driver.serviceAccountName=elevator-bi-spark"
            - "--conf"
            - "spark.kubernetes.driver.pod.name=$(POD_NAME)"
            - "--conf"
            - "spark.executor.instances=2"
            - "--conf"
            - "spark.executor.cores=1"
            - "--conf"
            - "spark.executor.memory=512m"
            - "--conf"
            - "spark.driver.memory=512m"
            - "--conf"
            - "spark.sql.shuffle.partitions=4"
            - "--conf"
            - "spark.eventLog.enabled=true"
            - "--conf"
            - "spark.eventLog.dir=file:///checkpoint/spark-events"
            - "--conf"
            - "spark.driver.host=$(POD_IP)"
            - "--conf"
            - "spark.driver.bindAddress=0.0.0.0"
            - "--conf"
            - "spark.driver.port=7078"
            - "--conf"
            - "spark.blockManager.port=7079"
            - "--conf"
            - "spark.kubernetes.executor.label.app=elevator-bi"
            - "--conf"
            - "spark.kubernetes.executor.label.part-of=elevator"
            - "--conf"
            - "spark.kubernetes.executor.label.role=executor"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.checkpoint.mount.path=/checkpoint"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.checkpoint.options.path={{ .Values.bi.checkpointHostPath }}"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.mount.path=/opt/elevator-bi/logs"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.options.path={{ .Values.bi.logsHostPath }}"
            - "local:///opt/spark/jobs/elevator-bi.jar"
          ports:
            - { name: driver-rpc, containerPort: 7078 }
            - { name: blockmanager, containerPort: 7079 }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: checkpoint, mountPath: /checkpoint }
            - { name: logs, mountPath: /opt/elevator-bi/logs }
      volumes:
        - name: checkpoint
          hostPath:
            path: {{ .Values.bi.checkpointHostPath | quote }}
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: {{ .Values.bi.logsHostPath | quote }}
            type: DirectoryOrCreate
---
# The Spark "orders served" job (batch) — driver pod; no streaming checkpoint, only the log volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-orders-served
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
    app: elevator-bi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: elevator-bi, role: orders-served-driver }
  template:
    metadata:
      labels: { app: elevator-bi, role: orders-served-driver, part-of: elevator }
    spec:
      serviceAccountName: elevator-bi-spark
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-dirs
          image: {{ .Values.images.bi }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["sh", "-c", "mkdir -p /opt/elevator-bi/logs/spark-events && chmod -R 0777 /opt/elevator-bi/logs"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - { name: logs, mountPath: /opt/elevator-bi/logs }
      containers:
        - name: driver
          image: {{ .Values.images.bi }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef: { name: elevator-bi-config }
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: HOME, value: "/tmp" }
            - { name: SPARK_LOCAL_DIRS, value: "/tmp" }
          command: ["/opt/spark/bin/spark-submit"]
          args:
            - "--master"
            - "k8s://https://kubernetes.default.svc:443"
            - "--deploy-mode"
            - "client"
            - "--name"
            - "elevator-orders-served"
            - "--class"
            - "pl.feelcodes.elevator.bi.OrdersServedJob"
            - "--conf"
            - "spark.kubernetes.namespace=default"
            - "--conf"
            - "spark.kubernetes.container.image={{ .Values.images.bi }}"
            - "--conf"
            - "spark.kubernetes.container.image.pullPolicy={{ .Values.images.pullPolicy }}"
            - "--conf"
            - "spark.kubernetes.authenticate.driver.serviceAccountName=elevator-bi-spark"
            - "--conf"
            - "spark.kubernetes.driver.pod.name=$(POD_NAME)"
            - "--conf"
            - "spark.executor.instances=2"
            - "--conf"
            - "spark.executor.cores=1"
            - "--conf"
            - "spark.executor.memory=512m"
            - "--conf"
            - "spark.driver.memory=512m"
            - "--conf"
            - "spark.sql.shuffle.partitions=4"
            - "--conf"
            - "spark.eventLog.enabled=true"
            - "--conf"
            - "spark.eventLog.dir=file:///opt/elevator-bi/logs/spark-events"
            - "--conf"
            - "spark.driver.host=$(POD_IP)"
            - "--conf"
            - "spark.driver.bindAddress=0.0.0.0"
            - "--conf"
            - "spark.driver.port=7080"
            - "--conf"
            - "spark.blockManager.port=7081"
            - "--conf"
            - "spark.kubernetes.executor.label.app=elevator-bi"
            - "--conf"
            - "spark.kubernetes.executor.label.part-of=elevator"
            - "--conf"
            - "spark.kubernetes.executor.label.role=executor"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.mount.path=/opt/elevator-bi/logs"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.options.path={{ .Values.bi.logsHostPath }}"
            - "local:///opt/spark/jobs/elevator-bi.jar"
          ports:
            - { name: driver-rpc, containerPort: 7080 }
            - { name: blockmanager, containerPort: 7081 }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: logs, mountPath: /opt/elevator-bi/logs }
      volumes:
        - name: logs
          hostPath:
            path: {{ .Values.bi.logsHostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
