# NetworkPolicies — expose ONLY the api; keep kafka/postgres/app internal. Enforced under Calico
# (Terraform installs it). Policies are a UNION; the BI ones below are added when bi.enabled.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  podSelector: {}            # all pods in the namespace
  policyTypes: [Ingress]
  # no ingress rules => deny all ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-external
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app: elevator-api }
  policyTypes: [Ingress]
  ingress:
    - from: []               # from anywhere (incl. outside the cluster) — the visible edge
      ports:
        - { protocol: TCP, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-internal
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
        {{- if .Values.bi.enabled }}
        - podSelector: { matchLabels: { app: elevator-bi } }
        {{- end }}
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-internal
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
        {{- if .Values.bi.enabled }}
        - podSelector: { matchLabels: { app: elevator-bi } }
        {{- end }}
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-cluster-internal
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app: elevator-app }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 2551 }   # Pekko remoting
        - { protocol: TCP, port: 8558 }   # Pekko management / cluster bootstrap
    - from:                               # kubelet liveness/readiness probes come from the node
        - ipBlock: { cidr: {{ .Values.nodeCidr | quote }} }
      ports:
        - { protocol: TCP, port: 8558 }
{{- if .Values.consoleWeb.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webconsole-probe
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app: elevator-console-web }
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: {{ .Values.nodeCidr | quote }} }   # kubelet probe source
      ports:
        - { protocol: TCP, port: 80 }
{{- end }}
