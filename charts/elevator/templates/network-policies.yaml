# Base NetworkPolicies — expose ONLY the api; keep kafka/postgres/app internal. Enforced under
# Calico. Policies are a UNION: the console-web + BI subcharts add their own policies when enabled,
# so nothing here is conditional.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector: {}            # all pods in the namespace
  policyTypes: [Ingress]
  # no ingress rules => deny all ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-external
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: elevator-api }
  policyTypes: [Ingress]
  ingress:
    - from: []               # from anywhere (incl. outside the cluster) — the visible edge
      ports:
        - { protocol: TCP, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-cluster-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: elevator-app }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 2551 }   # Pekko remoting
        - { protocol: TCP, port: 8558 }   # Pekko management / cluster bootstrap
    - from:                               # kubelet liveness/readiness probes come from the node
        - ipBlock: { cidr: {{ .Values.global.nodeCidr | quote }} }
      ports:
        - { protocol: TCP, port: 8558 }
