# Base NetworkPolicies (Calico-enforced): default-deny ingress, expose ONLY the api externally, keep
# kafka/postgres/app internal. Policies are a UNION, so the console-web + BI subcharts add their own —
# nothing here is conditional. The app also allows :8558 from nodeCidr for kubelet probes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-external
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: elevator-api }
  policyTypes: [Ingress]
  ingress:
    - from: []
      ports:
        - { protocol: TCP, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-cluster-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: elevator-app }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-app } }
      ports:
        - { protocol: TCP, port: 2551 }
        - { protocol: TCP, port: 8558 }
    - from:
        - ipBlock: { cidr: {{ .Values.global.nodeCidr | quote }} }
      ports:
        - { protocol: TCP, port: 8558 }
