# The ONE place app params live. Both elevator-app and elevator-api mount this ConfigMap as env
# (envFrom) and as files under /etc/elevator-config for LIVE, restart-free reconfiguration.
# Do NOT use subPath on the mounts, or the kubelet stops syncing edits into the files.
apiVersion: v1
kind: ConfigMap
metadata:
  name: elevator-config
  labels:
    {{- include "elevator.labels" . | nindent 4 }}
data:
  # ---- managed app params (hot-reloaded) ----
  ELEVATOR_MAXFLOOR: {{ .Values.config.maxFloor | quote }}
  ELEVATOR_ELEVATORS: {{ .Values.config.elevators | quote }}
  # elevator engine, hot-swapped per move. fast | slow.
  ELEVATOR_ENGINE: {{ .Values.config.engine | quote }}
  # BI on/off. Read at api startup (@ConditionalOnProperty); Helm keeps it in step with the pods.
  ELEVATOR_BI_ENABLED: {{ .Values.bi.enabled | quote }}

  # ---- infra wiring (needs a restart to change) ----
  ELEVATOR_PG_HOST: {{ .Values.postgres.host | quote }}
  ELEVATOR_STATS_PG_HOST: {{ .Values.bi.stats.host | quote }}
  ELEVATOR_STATS_PG_DATABASE: {{ .Values.bi.stats.database | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfile | quote }}
  SERVER_PORT: "8080"
  # Kafka — app-side env names
  ELEVATOR_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrap | quote }}
  ELEVATOR_KAFKA_GROUP_ID: {{ .Values.kafka.groupId | quote }}
  ELEVATOR_KAFKA_COMMAND_TOPIC: {{ .Values.kafka.commandTopic | quote }}
  ELEVATOR_KAFKA_STATE_TOPIC: {{ .Values.kafka.stateTopic | quote }}
  # Kafka — api-side env names (same values, different keys)
  SPRING_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrap | quote }}
  ELEVATOR_COMMAND_TOPIC: {{ .Values.kafka.commandTopic | quote }}
  ELEVATOR_STATE_TOPIC: {{ .Values.kafka.stateTopic | quote }}
