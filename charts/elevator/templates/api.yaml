# The Spring edge: Service for POST /api/order + the monitor, serving HTTPS from the elevator-api-tls
# keystore. Rolls in place (no surge) on the CPU-constrained single node. ELEVATOR_POD_NAME gives each
# replica a unique state-consumer group so every replica reads the full fanout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-api
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: elevator-api
  template:
    metadata:
      labels:
        app: elevator-api
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: elevator-api
          image: {{ .Values.global.images.api }}
          imagePullPolicy: {{ .Values.global.images.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: elevator-config
          env:
            - { name: ELEVATOR_TLS_ENABLED, value: "true" }
            - { name: ELEVATOR_TLS_KEYSTORE, value: "/etc/tls/keystore.p12" }
            - name: ELEVATOR_TLS_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ .Values.api.tlsSecret }}, key: password }
            - name: ELEVATOR_POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
          volumeMounts:
            - { name: tls, mountPath: /etc/tls, readOnly: true }
            - { name: elevator-config, mountPath: /etc/elevator-config, readOnly: true }
            {{- if .Values.bi.enabled }}
            - { name: data, mountPath: /data, readOnly: true }
            {{- end }}
          readinessProbe:
            httpGet: { path: /api/elevator, port: 8080, scheme: HTTPS }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.api.tlsSecret }}
            items:
              - { key: keystore.p12, path: keystore.p12 }
        - name: elevator-config
          configMap:
            name: elevator-config
        {{- if .Values.bi.enabled }}
        - name: data
          hostPath:
            path: {{ .Values.bi.parquetHostPath | quote }}
            type: DirectoryOrCreate
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: elevator-api
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  type: {{ .Values.api.serviceType | default "ClusterIP" }}
  selector:
    app: elevator-api
  ports:
    - port: 8080
      targetPort: 8080
      {{- if and (eq (.Values.api.serviceType | default "ClusterIP") "NodePort") .Values.api.nodePort }}
      nodePort: {{ .Values.api.nodePort }}
      {{- end }}
