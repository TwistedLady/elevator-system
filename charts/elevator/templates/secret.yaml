# Postgres password as a Secret (not the app ConfigMap) so it isn't world-readable in `kubectl get cm`.
# Value still comes from global.postgres.password — demo-only; source it from a real secret store in prod.
apiVersion: v1
kind: Secret
metadata:
  name: elevator-pg
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
type: Opaque
stringData:
  password: {{ .Values.global.postgres.password | quote }}
