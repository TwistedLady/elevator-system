# Additive NetworkPolicies for BI (a UNION with the parent's base). Separate objects, not edits to
# the base — so no conditionals anywhere: the whole subchart is skipped when bi.enabled is false.
#   - bi <-> bi        : driver <-> executor RPC
#   - bi -> kafka      : executors read elevator-state
#   - bi -> postgres   : the driver upserts (foreachBatch runs on the driver)
#   - postgres-stats   : 5432 only from the api (reads) + the Spark BI jobs (writes)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bi-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: elevator-bi }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-from-bi
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-bi
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-stats-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: postgres-stats }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-api } }
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 5432 }
