# Additive BI NetworkPolicies (a UNION with the parent's base; the whole subchart is skipped when
# bi.enabled is false, so no conditionals): bi<->bi driver/executor RPC, bi->kafka (read elevator-state),
# bi->postgres (read order_status). The stats read-model is a Parquet file, so there's no analytics DB.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bi-internal
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: elevator-bi }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-from-bi
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 9092 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-bi
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: elevator-bi } }
      ports:
        - { protocol: TCP, port: 5432 }
