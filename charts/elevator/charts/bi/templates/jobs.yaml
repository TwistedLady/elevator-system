# BI job config (12-factor env). Matches in-cluster service names.
apiVersion: v1
kind: ConfigMap
metadata:
  name: elevator-bi-config
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
data:
  ELEVATOR_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.global.kafka.bootstrap | quote }}
  ELEVATOR_KAFKA_STATE_TOPIC: {{ .Values.global.kafka.stateTopic | quote }}
  ELEVATOR_BI_SOURCE_JDBC_URL: "jdbc:postgresql://{{ .Values.global.postgres.host }}:5432/{{ .Values.global.postgres.database }}"
  ELEVATOR_PG_USER: {{ .Values.global.postgres.user | quote }}
  ELEVATOR_PG_PASSWORD: {{ .Values.global.postgres.password | quote }}
  ELEVATOR_BI_ORDER_STATUS_TABLE: "order_status"
  ELEVATOR_BI_PARQUET_PATH: "file:///data/elevators.parquet"
  ELEVATOR_BI_INTERVAL: "30"
---
# RBAC for Spark-on-Kubernetes: the driver creates/watches/deletes its executor pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elevator-bi-spark
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: elevator-bi-spark
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elevator-bi-spark
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
subjects:
  - kind: ServiceAccount
    name: elevator-bi-spark
roleRef:
  kind: Role
  name: elevator-bi-spark
  apiGroup: rbac.authorization.k8s.io
---
# The single Spark stats job (batch loop) — this Deployment pod IS the Spark driver (client mode);
# it spark-submits against the in-cluster API server, spawning executor pods. Each cycle re-scans
# Kafka (mileage) + order_status (orders served), joins them, and overwrites one Parquet file on the
# shared `data` hostPath. The api reads that file via DuckDB.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-stats
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
    app: elevator-bi
spec:
  replicas: 1
  strategy:
    type: Recreate            # one driver at a time — must not race the old for the Parquet swap
  selector:
    matchLabels: { app: elevator-bi, role: driver }
  template:
    metadata:
      labels: { app: elevator-bi, role: driver, part-of: elevator }
    spec:
      serviceAccountName: elevator-bi-spark
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-dirs
          image: {{ .Values.global.images.bi }}
          imagePullPolicy: {{ .Values.global.images.pullPolicy }}
          command: ["sh", "-c", "mkdir -p /opt/elevator-bi/logs/spark-events /data && chmod -R 0777 /opt/elevator-bi/logs /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - { name: logs, mountPath: /opt/elevator-bi/logs }
            - { name: data, mountPath: /data }
      containers:
        - name: driver
          image: {{ .Values.global.images.bi }}
          imagePullPolicy: {{ .Values.global.images.pullPolicy }}
          envFrom:
            - configMapRef: { name: elevator-bi-config }
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: HOME, value: "/tmp" }
            - { name: SPARK_LOCAL_DIRS, value: "/tmp" }
          command: ["/opt/spark/bin/spark-submit"]
          args:
            - "--master"
            - "k8s://https://kubernetes.default.svc:443"
            - "--deploy-mode"
            - "client"
            - "--name"
            - "elevator-stats"
            - "--class"
            - "pl.feelcodes.elevator.bi.ElevatorStatsJob"
            - "--conf"
            - "spark.kubernetes.namespace=default"
            - "--conf"
            - "spark.kubernetes.container.image={{ .Values.global.images.bi }}"
            - "--conf"
            - "spark.kubernetes.container.image.pullPolicy={{ .Values.global.images.pullPolicy }}"
            - "--conf"
            - "spark.kubernetes.authenticate.driver.serviceAccountName=elevator-bi-spark"
            - "--conf"
            - "spark.kubernetes.driver.pod.name=$(POD_NAME)"
            - "--conf"
            - "spark.executor.instances=2"
            - "--conf"
            - "spark.executor.cores=1"
            - "--conf"
            - "spark.executor.memory=512m"
            - "--conf"
            - "spark.driver.memory=512m"
            - "--conf"
            - "spark.sql.shuffle.partitions=4"
            - "--conf"
            - "spark.eventLog.enabled=true"
            - "--conf"
            - "spark.eventLog.dir=file:///opt/elevator-bi/logs/spark-events"
            - "--conf"
            - "spark.driver.host=$(POD_IP)"
            - "--conf"
            - "spark.driver.bindAddress=0.0.0.0"
            - "--conf"
            - "spark.driver.port=7078"
            - "--conf"
            - "spark.blockManager.port=7079"
            - "--conf"
            - "spark.kubernetes.executor.label.app=elevator-bi"
            - "--conf"
            - "spark.kubernetes.executor.label.part-of=elevator"
            - "--conf"
            - "spark.kubernetes.executor.label.role=executor"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.data.mount.path=/data"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.data.options.path={{ .Values.parquetHostPath }}"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.mount.path=/opt/elevator-bi/logs"
            - "--conf"
            - "spark.kubernetes.executor.volumes.hostPath.logs.options.path={{ .Values.logsHostPath }}"
            - "local:///opt/spark/jobs/elevator-bi.jar"
          ports:
            - { name: driver-rpc, containerPort: 7078 }
            - { name: blockmanager, containerPort: 7079 }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: logs, mountPath: /opt/elevator-bi/logs }
            - { name: data, mountPath: /data }
      volumes:
        - name: logs
          hostPath:
            path: {{ .Values.logsHostPath | quote }}
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: {{ .Values.parquetHostPath | quote }}
            type: DirectoryOrCreate
