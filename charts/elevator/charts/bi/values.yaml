# BI subchart defaults; the parent's `bi:` block overrides these (and carries `enabled`). Shared
# DB/kafka/image come from `.Values.global.*`. hostPath dirs are on the single kind node (durable logs +
# the shared Parquet the job writes and the api reads via DuckDB).
enabled: true
schedule: "*/15 * * * *"
logsHostPath: "/mnt/elevator-bi-logs"
parquetHostPath: "/mnt/elevator-bi-parquet"
