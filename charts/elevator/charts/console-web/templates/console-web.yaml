# The Elm web console: nginx serving the static bundle + reverse-proxying /api + /actuator to the
# elevator-api Service. Internal-only (ClusterIP) — reach it via
# `kubectl port-forward svc/elevator-console-web 8081:80`. The NetworkPolicy allows the kubelet's :80
# readiness probe (from nodeCidr) under the parent's Calico default-deny.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator-console-web
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: elevator-console-web
  template:
    metadata:
      labels:
        app: elevator-console-web
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: elevator-console-web
          image: {{ .Values.global.images.consoleWeb }}
          imagePullPolicy: {{ .Values.global.images.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: elevator-console-web
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  type: {{ .Values.serviceType | default "ClusterIP" }}
  selector:
    app: elevator-console-web
  ports:
    - port: 80
      targetPort: 80
      {{- if and (eq (.Values.serviceType | default "ClusterIP") "NodePort") .Values.nodePort }}
      nodePort: {{ .Values.nodePort }}
      {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webconsole-probe
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: elevator
spec:
  podSelector:
    matchLabels: { app: elevator-console-web }
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: {{ .Values.global.nodeCidr | quote }} }
      ports:
        - { protocol: TCP, port: 80 }
